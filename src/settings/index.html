<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' file: data:; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>러버덕 디버거 설정</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <h1>🦆 러버덕 디버거 설정</h1>

  <section>
    <h2>캐릭터</h2>
    <div class="radios">
      <label><input type="radio" name="charType" value="emoji" checked> 이모지</label>
      <label><input type="radio" name="charType" value="image"> 이미지 파일</label>
    </div>
    <div class="row"><span class="lbl">이모지</span>
      <input id="emoji" type="text" maxlength="8" value="🦆"></div>
    <div class="row"><span class="lbl">이미지</span>
      <input id="imagePath" type="text" placeholder="선택 안 함" readonly>
      <button id="pickImage" type="button">찾기…</button></div>
    <div class="row"><span class="lbl">크기</span>
      <input id="size" type="range" min="60" max="220" value="110">
      <span id="sizeVal" class="val">110px</span></div>
    <div id="preview" class="preview"></div>
  </section>

  <section>
    <h2>말풍선 문구 <small>(한 줄에 하나 · 랜덤 표시)</small></h2>
    <textarea id="phrases" rows="6" placeholder="꽥!"></textarea>
    <div class="row"><span class="lbl">표시 시간</span>
      <input id="bubbleDuration" type="number" min="500" max="10000" step="100" value="2200">
      <span class="val">ms</span></div>
  </section>

  <section>
    <h2>소리</h2>
    <div class="radios">
      <label><input type="radio" name="soundType" value="synth" checked> 기본 합성 꽥</label>
      <label><input type="radio" name="soundType" value="file"> 사운드 파일</label>
    </div>
    <div class="row"><span class="lbl">파일</span>
      <input id="soundPath" type="text" placeholder="선택 안 함" readonly>
      <button id="pickSound" type="button">찾기…</button></div>
    <div class="row"><span class="lbl">볼륨</span>
      <input id="volume" type="range" min="0" max="1" step="0.05" value="0.6">
      <span id="volVal" class="val">60%</span></div>
  </section>

  <section>
    <label class="checkbox"><input id="alwaysOnTop" type="checkbox" checked> 항상 위에 표시</label>
  </section>

  <div class="actions">
    <button id="test" type="button">꽥! 테스트</button>
    <button id="save" type="button" class="primary">저장</button>
  </div>
  <div id="toast" class="toast"></div>

  <script src="settings.js"></script>
</body>
</html>
