<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' file: data:; media-src 'self' file: data:; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <link rel="stylesheet" href="duck.css">
</head>
<body>
  <div id="stage">
    <div id="move-hint">
      <span>🖐️ 드래그해서 이동</span>
      <button id="move-done" type="button">완료</button>
    </div>
    <div id="bubble"></div>
    <div id="hotzone">
      <div id="duck">
        <div id="duck-scale">
          <img id="duck-img" alt="캐릭터" draggable="false">
          <span id="duck-emoji">🦆</span>
        </div>
      </div>
    </div>
  </div>
  <script src="duck.js"></script>
</body>
</html>
